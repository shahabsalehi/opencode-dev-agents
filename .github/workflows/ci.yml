name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Coverage (threshold enforced)
        run: npm run coverage

      - name: Governance eval (policy regression gate)
        run: node dist/benchmark/run-eval.js
